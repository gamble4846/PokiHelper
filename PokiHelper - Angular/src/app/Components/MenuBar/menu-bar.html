<header class="super-user-menu-bar">
    <div class="menu-bar-inner">
        <button type="button" class="hamburger" aria-label="Toggle menu" [attr.aria-expanded]="menuOpen"
            (click)="toggleMenu()">
            <span class="hamburger-line" [class.open]="menuOpen"></span>
            <span class="hamburger-line" [class.open]="menuOpen"></span>
            <span class="hamburger-line" [class.open]="menuOpen"></span>
        </button>

        <nav class="nav-links nav-desktop">
            @for (item of menuItems; track item.path) {
            <a [routerLink]="[getSuperUserBasePath(), item.path]" routerLinkActive="nav-link-active"
                [routerLinkActiveOptions]="{ exact: false }" class="nav-link">
                {{ item.label }}
            </a>
            }
        </nav>
    </div>

    <!-- Mobile overlay menu -->
    <div class="nav-overlay" [class.open]="menuOpen" (click)="closeMenu()" role="button" tabindex="0"
        aria-label="Close menu"></div>
    <aside class="nav-drawer" [class.open]="menuOpen">
        <nav class="nav-links nav-mobile">
            @for (item of menuItems; track item.path) {
            <a [routerLink]="[getSuperUserBasePath(), item.path]" routerLinkActive="nav-link-active"
                [routerLinkActiveOptions]="{ exact: false }" class="nav-link" (click)="closeMenu()">
                {{ item.label }}
            </a>
            }
        </nav>
    </aside>
</header>
